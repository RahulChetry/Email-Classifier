services:
  - type: web
    name: email-priority-classifier
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_CONFIG_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
